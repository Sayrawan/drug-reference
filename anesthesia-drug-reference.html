<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PharmWatch — Anesthesia Drug Reference</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg-deep:#0A1210;
  --bg-panel:#101B18;
  --bg-card:#132420;
  --bg-card-hover:#16302A;
  --line:#1F3733;
  --line-soft:#182C28;
  --text-primary:#E7F2ED;
  --text-muted:#7FA096;
  --text-dim:#4E6B62;
  --green:#35D07F;
  --cyan:#38C7D6;
  --amber:#EAC15A;
  --red:#E45B4E;
  --violet:#B490E8;
  --blue:#5FA6E0;
  --coral:#E38A66;
  --grey:#9AA8A2;
  --font-mono:'IBM Plex Mono', monospace;
  --font-sans:'IBM Plex Sans', sans-serif;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;background:var(--bg-deep);color:var(--text-primary);font-family:var(--font-sans);}
body{
  background-image:
    radial-gradient(ellipse at 20% -10%, rgba(53,208,127,0.06), transparent 45%),
    radial-gradient(ellipse at 90% 10%, rgba(95,166,224,0.05), transparent 40%);
}
::selection{background:var(--green);color:#04140F;}
::-webkit-scrollbar{width:10px;height:10px;}
::-webkit-scrollbar-track{background:var(--bg-deep);}
::-webkit-scrollbar-thumb{background:var(--line);border-radius:6px;}

header.topbar{
  position:sticky;top:0;z-index:50;
  background:linear-gradient(180deg, var(--bg-panel) 0%, rgba(16,27,24,0.97) 100%);
  border-bottom:1px solid var(--line);
  backdrop-filter:blur(6px);
}
.topbar-inner{
  max-width:1280px;margin:0 auto;padding:14px 20px;
  display:flex;align-items:center;gap:18px;flex-wrap:wrap;
}
.brand{display:flex;align-items:center;gap:10px;}
.brand-pulse{width:10px;height:10px;border-radius:50%;background:var(--green);box-shadow:0 0 0 0 rgba(53,208,127,0.6);animation:pulse 2s infinite;}
@keyframes pulse{
  0%{box-shadow:0 0 0 0 rgba(53,208,127,0.55);}
  70%{box-shadow:0 0 0 8px rgba(53,208,127,0);}
  100%{box-shadow:0 0 0 0 rgba(53,208,127,0);}
}
.brand-text{font-family:var(--font-mono);font-weight:600;letter-spacing:0.5px;font-size:15px;}
.brand-text span{color:var(--text-muted);font-weight:400;}
.brand-sub{font-family:var(--font-mono);font-size:10.5px;color:var(--text-dim);letter-spacing:1.2px;text-transform:uppercase;margin-top:1px;}

.search-wrap{flex:1;min-width:220px;display:flex;align-items:center;gap:8px;background:var(--bg-card);border:1px solid var(--line);border-radius:8px;padding:9px 12px;}
.search-wrap svg{flex-shrink:0;color:var(--text-dim);}
#search{
  flex:1;background:transparent;border:none;outline:none;color:var(--text-primary);
  font-family:var(--font-sans);font-size:14px;
}
#search::placeholder{color:var(--text-dim);}

.view-toggle{display:flex;gap:6px;background:var(--bg-card);border:1px solid var(--line);border-radius:8px;padding:3px;}
.view-toggle button{
  background:transparent;border:none;color:var(--text-muted);font-family:var(--font-mono);
  font-size:11.5px;letter-spacing:0.4px;padding:6px 12px;border-radius:6px;cursor:pointer;transition:all .15s;
}
.view-toggle button.active{background:var(--green);color:#04140F;font-weight:600;}

.channels{
  max-width:1280px;margin:0 auto;padding:14px 20px 0;
  display:flex;gap:8px;flex-wrap:wrap;
}
.channel-btn{
  display:flex;align-items:center;gap:8px;
  background:var(--bg-card);border:1px solid var(--line);border-radius:20px;
  padding:7px 14px 7px 10px;cursor:pointer;transition:all .15s;
  font-family:var(--font-mono);font-size:12px;color:var(--text-muted);
}
.channel-btn .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.channel-btn:hover{border-color:var(--text-dim);color:var(--text-primary);}
.channel-btn.active{border-color:currentColor;color:var(--text-primary);background:var(--bg-card-hover);}
.channel-count{color:var(--text-dim);font-size:10.5px;}

main{max-width:1280px;margin:0 auto;padding:18px 20px 80px;}
.section-label{
  font-family:var(--font-mono);font-size:11px;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--text-dim);margin:22px 0 10px;padding-left:2px;
}
.grid{display:grid;grid-template-columns:repeat(auto-fill, minmax(300px,1fr));gap:12px;}

.card{
  background:var(--bg-card);border:1px solid var(--line);border-radius:10px;
  padding:14px 16px 15px;cursor:pointer;transition:all .15s;position:relative;overflow:hidden;
}
.card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent,var(--green));}
.card:hover{background:var(--bg-card-hover);border-color:var(--line-soft);transform:translateY(-1px);}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:8px;}
.card-name{font-size:16px;font-weight:600;color:var(--text-primary);}
.card-class{font-family:var(--font-mono);font-size:10px;color:var(--accent,var(--green));text-transform:uppercase;letter-spacing:0.6px;margin-top:2px;}
.badge-row{display:flex;gap:5px;flex-shrink:0;}
.badge{font-family:var(--font-mono);font-size:9.5px;padding:2px 6px;border-radius:4px;font-weight:600;letter-spacing:0.3px;}
.badge.pearl{background:rgba(234,193,90,0.15);color:var(--amber);}
.badge.alert{background:rgba(228,91,78,0.15);color:var(--red);}

.pk-strip{margin:10px 0 8px;}
.pk-track{height:6px;border-radius:3px;background:var(--bg-deep);position:relative;overflow:hidden;border:1px solid var(--line-soft);}
.pk-onset{position:absolute;left:0;top:0;bottom:0;background:var(--line);}
.pk-fill{position:absolute;top:0;bottom:0;background:var(--accent,var(--green));opacity:0.55;}
.pk-labels{display:flex;justify-content:space-between;margin-top:5px;font-family:var(--font-mono);font-size:10px;color:var(--text-dim);}
.pk-labels b{color:var(--text-muted);font-weight:500;}

.card-facts{display:flex;gap:14px;margin-top:8px;font-family:var(--font-mono);font-size:11px;color:var(--text-muted);}
.card-facts div b{display:block;color:var(--text-primary);font-size:12.5px;}

.overlay{
  position:fixed;inset:0;background:rgba(4,10,9,0.72);backdrop-filter:blur(3px);
  display:none;align-items:flex-start;justify-content:center;z-index:100;padding:40px 16px;overflow-y:auto;
}
.overlay.open{display:flex;}
.modal{
  background:var(--bg-panel);border:1px solid var(--line);border-radius:14px;
  max-width:680px;width:100%;padding:26px 28px 28px;position:relative;animation:rise .18s ease;
}
@keyframes rise{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.modal-close{
  position:absolute;top:18px;right:18px;background:var(--bg-card);border:1px solid var(--line);
  color:var(--text-muted);border-radius:8px;width:30px;height:30px;cursor:pointer;font-size:16px;line-height:1;
}
.modal-close:hover{color:var(--text-primary);}
.modal-header{display:flex;align-items:center;gap:10px;margin-bottom:4px;}
.modal-dot{width:10px;height:10px;border-radius:50%;}
.modal-name{font-size:24px;font-weight:700;}
.modal-class{font-family:var(--font-mono);font-size:12px;text-transform:uppercase;letter-spacing:0.6px;margin:2px 0 18px;}

.modal-pk{
  display:grid;grid-template-columns:repeat(4,1fr);gap:10px;
  background:var(--bg-card);border:1px solid var(--line-soft);border-radius:10px;padding:12px 14px;margin-bottom:18px;
}
.modal-pk div{text-align:left;}
.modal-pk .lbl{font-family:var(--font-mono);font-size:9.5px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.5px;}
.modal-pk .val{font-family:var(--font-mono);font-size:13px;color:var(--text-primary);margin-top:3px;font-weight:500;}

.modal-section{margin-bottom:16px;}
.modal-section h4{
  font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:1px;
  color:var(--text-dim);margin:0 0 7px;
}
.modal-section p{margin:0;font-size:14px;line-height:1.55;color:var(--text-primary);}
.modal-section ul{margin:0;padding-left:18px;font-size:13.5px;line-height:1.7;color:var(--text-primary);}
.modal-section.pearl{background:rgba(234,193,90,0.08);border:1px solid rgba(234,193,90,0.25);border-radius:9px;padding:12px 14px;}
.modal-section.pearl h4{color:var(--amber);}
.modal-section.alert{background:rgba(228,91,78,0.08);border:1px solid rgba(228,91,78,0.3);border-radius:9px;padding:12px 14px;}
.modal-section.alert h4{color:var(--red);}
.modal-section.contra h4{color:var(--coral);}

.compare-wrap{display:none;}
.compare-wrap.open{display:block;}
.compare-group{margin-bottom:28px;}
.compare-title{font-family:var(--font-mono);font-size:13px;letter-spacing:0.6px;text-transform:uppercase;margin-bottom:10px;}
table.cmp{width:100%;border-collapse:collapse;font-size:13px;}
table.cmp th{
  text-align:left;font-family:var(--font-mono);font-size:10.5px;text-transform:uppercase;letter-spacing:0.5px;
  color:var(--text-dim);padding:8px 10px;border-bottom:1px solid var(--line);
}
table.cmp td{padding:9px 10px;border-bottom:1px solid var(--line-soft);vertical-align:top;}
table.cmp tr:nth-child(even) td{background:rgba(255,255,255,0.015);}
table.cmp td.name{font-weight:600;color:var(--text-primary);}
table.cmp tr:hover td{background:var(--bg-card-hover);}

.empty{text-align:center;padding:60px 20px;color:var(--text-dim);font-family:var(--font-mono);font-size:13px;}

footer{
  max-width:1280px;margin:0 auto;padding:20px 20px 40px;
  color:var(--text-dim);font-family:var(--font-mono);font-size:11px;text-align:center;
  border-top:1px solid var(--line-soft);margin-top:20px;
}

@media (max-width:640px){
  .modal-pk{grid-template-columns:repeat(2,1fr);}
  .card-facts{flex-wrap:wrap;}
}
</style>
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <div class="brand-pulse"></div>
      <div>
        <div class="brand-text">PharmWatch <span>/ anesthesia drug reference</span></div>
        <div class="brand-sub">32 agents · 7 channels · onset → duration mapped</div>
      </div>
    </div>
    <div class="search-wrap">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input id="search" type="text" placeholder="Search drug, MOA, side effect, pearl…">
    </div>
    <div class="view-toggle">
      <button id="btn-cards" class="active">Cards</button>
      <button id="btn-compare">Compare</button>
    </div>
  </div>
  <div class="channels" id="channels"></div>
</header>

<main>
  <div id="cardsView"></div>
  <div class="compare-wrap" id="compareView"></div>
</main>

<footer>PharmWatch — built for study use only · always confirm doses against current institutional protocol and package insert</footer>

<div class="overlay" id="overlay">
  <div class="modal" id="modalContent"></div>
</div>

 onsetMin:0.5, durationMin:8,

{id:"etomidate", name:"Etomidate", cls:"induction",
 moa:"GABA-A potentiation (imidazole structure) with minimal effect on sympathetic tone.",

 pearls:["Largely superseded by propofol; still referenced for neuroprotection/status epilepticus in some settings"],

{id:"succinylcholine", name:"Succinylcholine", cls:"nmb",

function accentFor(cls){ return CLASSES[cls].color; }

function pkBarHTML(d, accent){
  if(d.durationMin===0 && d.bloodGas!==undefined){
    const pct = Math.max(4, Math.min(96, 100 - ((d.bloodGas-0.4)/(1.5-0.4))*100));
    return `<div class="pk-strip">
      <div class="pk-track"><div class="pk-fill" style="left:0;width:${pct}%;background:${accent};opacity:0.6"></div></div>
      <div class="pk-labels"><span>fast offset</span><b>blood:gas ${d.bloodGas}</b><span>slow offset</span></div>
    </div>`;
  }
  if(d.durationMin===0){
    return `<div class="pk-strip">
      <div class="pk-track"><div class="pk-fill" style="left:0;width:70%;background:${accent};opacity:0.5"></div></div>
      <div class="pk-labels"><span>onset ${d.onset}</span><b>titrated infusion</b><span>—</span></div>
    </div>`;
  }
  const total = d.onsetMin + d.durationMin;
  const onsetPct = Math.max(2, (d.onsetMin/total)*100);
  return `<div class="pk-strip">
    <div class="pk-track">
      <div class="pk-onset" style="width:${onsetPct}%"></div>
      <div class="pk-fill" style="left:${onsetPct}%;width:${100-onsetPct}%;background:${accent}"></div>
    </div>
    <div class="pk-labels"><span>onset ${d.onset}</span><b>duration ${d.duration}</b></div>
  </div>`;
}

function cardHTML(d){
  const accent = accentFor(d.cls);
  const hasPearl = d.pearls && d.pearls.length;
  const hasAlert = d.alerts && d.alerts.length;
  return `<div class="card" style="--accent:${accent}" data-id="${d.id}">
    <div class="card-top">
      <div>
        <div class="card-name">${d.name}</div>
        <div class="card-class" style="color:${accent}">${CLASSES[d.cls].label}</div>
      </div>
      <div class="badge-row">
        ${hasPearl?'<span class="badge pearl">PEARL</span>':''}
        ${hasAlert?'<span class="badge alert">ALERT</span>':''}
      </div>
    </div>
    ${pkBarHTML(d, accent)}
    <div class="card-facts">
      <div><b>${d.halflife.split(';')[0].split('(')[0].trim()}</b>half-life</div>
      <div><b>${d.metabolism.split(' ')[0]}</b>clearance</div>
    </div>
  </div>`;
}

function modalHTML(d){
  const accent = accentFor(d.cls);
  const section = (title,val,cls='') => val ? `<div class="modal-section ${cls}"><h4>${title}</h4><p>${val}</p></div>` : '';
  const listSection = (title,arr,cls='') => (arr && arr.length) ? `<div class="modal-section ${cls}"><h4>${title}</h4><ul>${arr.map(x=>`<li>${x}</li>`).join('')}</ul></div>` : '';
  return `
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-header"><div class="modal-dot" style="background:${accent}"></div><div class="modal-name">${d.name}</div></div>
    <div class="modal-class" style="color:${accent}">${CLASSES[d.cls].label}</div>
    ${pkBarHTML(d, accent)}
    <div class="modal-pk">
      <div><div class="lbl">Onset</div><div class="val">${d.onset}</div></div>
      <div><div class="lbl">${d.durationMin!==0?'Duration':(d.mac?'MAC':'Peak')}</div><div class="val">${d.durationMin!==0?d.duration:(d.mac||d.peak)}</div></div>
      <div><div class="lbl">Half-life</div><div class="val">${d.halflife}</div></div>
      <div><div class="lbl">Clearance</div><div class="val">${d.metabolism.split('—')[0].split('(')[0].trim()}</div></div>
    </div>
    ${section('Mechanism of Action', d.moa)}
    ${d.dosing && d.dosing.length ? `<div class="modal-section"><h4>Dosing</h4><ul>${d.dosing.map(([k,v])=>`<li><b>${k}:</b> ${v}</li>`).join('')}</ul></div>` : ''}
    ${listSection('Side Effects', d.sideEffects)}
    ${listSection('Contraindications / Cautions', d.contraindications, 'contra')}
    ${listSection('Clinical Pearls', d.pearls, 'pearl')}
    ${listSection('Alerts', d.alerts, 'alert')}
  `;
}

let activeChannel = 'all';
let searchTerm = '';

function buildChannels(){
  const wrap = document.getElementById('channels');
  const allBtn = `<div class="channel-btn active" data-cls="all" style="color:var(--text-primary)"><span class="dot" style="background:var(--grey)"></span>All<span class="channel-count">${DRUGS.length}</span></div>`;
  const btns = Object.entries(CLASSES).map(([key,val])=>{
    const count = DRUGS.filter(d=>d.cls===key).length;
    return `<div class="channel-btn" data-cls="${key}" style="color:${val.color}"><span class="dot" style="background:${val.color}"></span>${val.label}<span class="channel-count">${count}</span></div>`;
  }).join('');
  wrap.innerHTML = allBtn + btns;
  wrap.querySelectorAll('.channel-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      activeChannel = btn.dataset.cls;
      wrap.querySelectorAll('.channel-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      render();
    });
  });
}

function filterDrugs(){
  return DRUGS.filter(d=>{
    if(activeChannel!=='all' && d.cls!==activeChannel) return false;
    if(!searchTerm) return true;
    const hay = [d.name, d.moa, ...(d.sideEffects||[]), ...(d.pearls||[]), ...(d.alerts||[]), CLASSES[d.cls].label].join(' ').toLowerCase();
    return hay.includes(searchTerm);
  });
}

function render(){
  const list = filterDrugs();
  const view = document.getElementById('cardsView');
  if(list.length===0){
    view.innerHTML = `<div class="empty">No agents match — try another term or channel.</div>`;
    return;
  }
  if(activeChannel==='all'){
    let html = '';
    Object.entries(CLASSES).forEach(([key,val])=>{
      const items = list.filter(d=>d.cls===key);
      if(!items.length) return;
      html += `<div class="section-label" style="color:${val.color}">${val.label}</div><div class="grid">${items.map(cardHTML).join('')}</div>`;
    });
    view.innerHTML = html;
  } else {
    view.innerHTML = `<div class="grid">${list.map(cardHTML).join('')}</div>`;
  }
  view.querySelectorAll('.card').forEach(card=>{
    card.addEventListener('click', ()=>openModal(card.dataset.id));
  });
}

function openModal(id){
  const d = DRUGS.find(x=>x.id===id);
  document.getElementById('modalContent').innerHTML = modalHTML(d);
  document.getElementById('overlay').classList.add('open');
}
function closeModal(){
  document.getElementById('overlay').classList.remove('open');
}
document.getElementById('overlay').addEventListener('click', e=>{
  if(e.target.id==='overlay') closeModal();
});
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeModal(); });

document.getElementById('search').addEventListener('input', e=>{
  searchTerm = e.target.value.trim().toLowerCase();
  render();
});

function buildCompare(){
  const wrap = document.getElementById('compareView');
  let html = '';
  Object.entries(CLASSES).forEach(([key,val])=>{
    const items = DRUGS.filter(d=>d.cls===key);
    if(!items.length) return;
    html += `<div class="compare-group">
      <div class="compare-title" style="color:${val.color}">${val.label}</div>
      <table class="cmp"><thead><tr><th>Agent</th><th>Onset</th><th>Duration</th><th>Key distinguishing feature</th></tr></thead><tbody>
      ${items.map(d=>`<tr><td class="name">${d.name}</td><td>${d.onset}</td><td>${d.durationMin!==0?d.duration:(d.mac?('MAC '+d.mac):'titrated')}</td><td>${(d.pearls&&d.pearls[0])||(d.alerts&&d.alerts[0])||''}</td></tr>`).join('')}
      </tbody></table>
    </div>`;
  });
  wrap.innerHTML = html;
}

document.getElementById('btn-cards').addEventListener('click', ()=>{
  document.getElementById('btn-cards').classList.add('active');
  document.getElementById('btn-compare').classList.remove('active');
  document.getElementById('cardsView').style.display='block';
  document.getElementById('compareView').classList.remove('open');
});
document.getElementById('btn-compare').addEventListener('click', ()=>{
  document.getElementById('btn-compare').classList.add('active');
  document.getElementById('btn-cards').classList.remove('active');
  document.getElementById('cardsView').style.display='none';
  document.getElementById('compareView').classList.add('open');
});

buildChannels();
buildCompare();
render();
</script>
